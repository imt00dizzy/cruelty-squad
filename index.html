Webport by <a href="https://dizzys.blog" target="_blank" id="dizzy-link">dizzy</a><br>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
var CDN = "https://raw.githubusercontent.com/imt00dizzy/cruelty-squad/main/";
var PCK_TOTAL_SIZE = 377172624;
var PCK_CHUNKS = [
"index.pck.part00.pck",
"index.pck.part01.pck",
"index.pck.part02.pck",
"index.pck.part03.pck",
"index.pck.part04.pck",
"index.pck.part05.pck",
"index.pck.part06.pck",
"index.pck.part07.pck"
];

var statusOverlay = document.getElementById("status");
var statusProgress = document.getElementById("status-progress");
var statusNotice = document.getElementById("status-notice");
var vantaEffect = null;

function initVanta() {
if (vantaEffect || !window.VANTA) return;
vantaEffect = VANTA.NET({
el: "#vanta-bg",
THREE: THREE,
mouseControls: false,
touchControls: false,
gyroControls: false,
color: 0xaa2222,
backgroundColor: 0x000000,
points: 9.0,
maxDistance: 22.0,
spacing: 18.0,
showDots: true
});
}

function updateProgress(current, total) {
if (current > 0 && total > 0) {
statusProgress.value = current;
statusProgress.max = total;
var progressLogo = document.getElementById("progress-logo");
var progressBar = document.getElementById("status-progress");
if (progressLogo && progressBar) {
var percentage = current / total;
var barWidth = progressBar.offsetWidth;
var logoWidth = progressLogo.offsetWidth;
progressLogo.style.left = ((barWidth * percentage) - (logoWidth / 2)) + "px";
}
}
}

function showNotice(text) {
while (statusNotice.lastChild) {
statusNotice.removeChild(statusNotice.lastChild);
}
text.split("\n").forEach(function(line) {
statusNotice.appendChild(document.createTextNode(line));
statusNotice.appendChild(document.createElement("br"));
});
statusProgress.style.display = "none";
statusNotice.style.display = "block";
}

async function fetchPCK() {
var chunks = [];
var totalLoaded = 0;
for (var i = 0; i < PCK_CHUNKS.length; i++) {
var response = await fetch(CDN + PCK_CHUNKS[i]);
if (!response.ok) throw new Error("Failed to fetch chunk: " + PCK_CHUNKS[i]);
var reader = response.body.getReader();
var parts = [];
while (true) {
var result = await reader.read();
if (result.done) break;
parts.push(result.value);
totalLoaded += result.value.length;
updateProgress(totalLoaded, PCK_TOTAL_SIZE);
}
var chunkSize = parts.reduce(function(s, p) { return s + p.length; }, 0);
var chunkData = new Uint8Array(chunkSize);
var offset = 0;
for (var j = 0; j < parts.length; j++) {
chunkData.set(parts[j], offset);
offset += parts[j].length;
}
chunks.push(chunkData);
}
var fullPck = new Uint8Array(totalLoaded);
var pos = 0;
for (var i = 0; i < chunks.length; i++) {
fullPck.set(chunks[i], pos);
pos += chunks[i].length;
}
return fullPck.buffer;
}

function setupInterception(urlMap) {
var _xhrOpen = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function(method, url) {
if (typeof url === "string") {
var filename = url.split("/").pop().split("?")[0];
if (urlMap[filename]) {
arguments[1] = urlMap[filename];
} else if (/^index\./.test(url) && url.indexOf("://") === -1) {
arguments[1] = CDN + url;
}
}
return _xhrOpen.apply(this, arguments);
};

var _fetch = window.fetch;
window.fetch = function(input) {
if (typeof input === "string") {
var filename = input.split("/").pop().split("?")[0];
if (urlMap[filename]) {
arguments[0] = urlMap[filename];
} else if (/^index\./.test(input) && input.indexOf("://") === -1) {
arguments[0] = CDN + input;
}
}
return _fetch.apply(this, arguments);
};

var _Worker = window.Worker;
window.Worker = function(url, opts) {
if (typeof url === "string") {
var filename = url.split("/").pop().split("?")[0];
if (urlMap[filename]) return new _Worker(urlMap[filename], opts);
}
return new _Worker(url, opts);
};
window.Worker.prototype = _Worker.prototype;

if (window.AudioWorklet) {
var _addModule = AudioWorklet.prototype.addModule;
AudioWorklet.prototype.addModule = function(url) {
if (typeof url === "string") {
var filename = url.split("/").pop().split("?")[0];
if (urlMap[filename]) {
arguments[0] = urlMap[filename];
} else if (/^index\./.test(url) && url.indexOf("://") === -1) {
arguments[0] = CDN + url;
}
}
return _addModule.apply(this, arguments);
};
}
}

async function loadGame() {
initVanta();
statusOverlay.style.visibility = "visible";
statusProgress.style.display = "block";

var pckBuffer = await fetchPCK();
var pckBlobUrl = URL.createObjectURL(new Blob([pckBuffer]));

var urlMap = {"index.pck": pckBlobUrl};

var workerResp = await fetch(CDN + "index.worker.js").catch(function() { return null; });
if (workerResp && workerResp.ok) {
urlMap["index.worker.js"] = URL.createObjectURL(new Blob([await workerResp.text()], {type: "application/javascript"}));
}

var workletResp = await fetch(CDN + "index.audio.worklet.js").catch(function() { return null; });
if (workletResp && workletResp.ok) {
urlMap["index.audio.worklet.js"] = URL.createObjectURL(new Blob([await workletResp.text()], {type: "application/javascript"}));
}

setupInterception(urlMap);

var engineResp = await fetch(CDN + "index.js");
if (!engineResp.ok) throw new Error("Failed to load engine");
var engineBlobUrl = URL.createObjectURL(new Blob([await engineResp.text()], {type: "application/javascript"}));
await new Promise(function(resolve, reject) {
var script = document.createElement("script");
script.src = engineBlobUrl;
script.onload = resolve;
script.onerror = function() { reject(new Error("Failed to execute engine")); };
document.head.appendChild(script);
});

var GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":377172624,"index.wasm":1510884},"focusCanvas":true,"gdnativeLibs":[]};
var engine = new Engine(GODOT_CONFIG);

await engine.startGame({
"onProgress": function(current, total) {}
});

if (vantaEffect) {
vantaEffect.destroy();
vantaEffect = null;
}
statusOverlay.remove();
}

(function() {
var canvas = document.createElement("canvas");
if (!(canvas.getContext("webgl2") || canvas.getContext("webgl"))) {
statusOverlay.style.visibility = "visible";
statusNotice.style.display = "block";
showNotice("WebGL not available");
return;
}
loadGame().catch(function(err) {
console.error(err);
if (err instanceof Error) {
showNotice(err.message);
} else if (typeof err === "string") {
showNotice(err);
} else {
showNotice("An unknown error occurred.");
}
});
}());
</script>
